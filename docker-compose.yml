# =====================================================
# CryptoPulse - docker-compose.yml
# Single-command bring-up of the entire pipeline.
#
# Usage:
#   cp .env.example .env   # only on first run
#   docker compose up --build
#
# Services:
#   - postgres        : relational store (prices, news, anomalies, links)
#   - pgadmin         : web UI for postgres
#   - airflow-init    : one-shot DB init + admin user creation
#   - airflow-webserver / airflow-scheduler : orchestration
#   - elasticsearch   : full-text search index for news
#   - kibana          : dashboards on top of elasticsearch
#   - pipeline        : team-authored Python code (ingestion + analysis library)
# =====================================================

x-airflow-common: &airflow-common
  build:
    context: ./docker/airflow
    dockerfile: Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # Make team-authored code importable from inside DAGs
    PYTHONPATH: /opt/airflow
    # Pass pipeline configuration to DAGs
    DATA_MODE: ${DATA_MODE}
    CRYPTO_SYMBOLS: ${CRYPTO_SYMBOLS}
    NEWS_RSS_FEEDS: ${NEWS_RSS_FEEDS}
    ZSCORE_THRESHOLD: ${ZSCORE_THRESHOLD}
    ZSCORE_WINDOW_MINUTES: ${ZSCORE_WINDOW_MINUTES}
    NEWS_LINK_WINDOW_MINUTES: ${NEWS_LINK_WINDOW_MINUTES}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
    ELASTICSEARCH_HOST: elasticsearch
    ELASTICSEARCH_PORT: 9200
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ---------------- PostgreSQL ----------------
  postgres:
    image: postgres:15
    container_name: cryptopulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cryptopulse-net

  # ---------------- pgAdmin ----------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: cryptopulse-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cryptopulse.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cryptopulse-net

  # ---------------- Airflow init (one-shot) ----------------
  airflow-init:
    <<: *airflow-common
    container_name: cryptopulse-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@cryptopulse.local || true
    restart: "no"
    networks:
      - cryptopulse-net

  # ---------------- Airflow webserver ----------------
  airflow-webserver:
    <<: *airflow-common
    container_name: cryptopulse-airflow-webserver
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - cryptopulse-net

  # ---------------- Airflow scheduler ----------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: cryptopulse-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - cryptopulse-net

  # ---------------- Elasticsearch ----------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: cryptopulse-elasticsearch
    hostname: elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: ${ES_JAVA_OPTS}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${ELASTICSEARCH_PORT}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - cryptopulse-net

  # ---------------- Kibana ----------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: cryptopulse-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT}:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - cryptopulse-net

  # ---------------- Kibana init (one-shot) ----------------
  # Creates the three data views (prices, anomalies, news) once Kibana is up,
  # so the team doesn't have to click through the UI on every fresh start.
  kibana-init:
    build:
      context: ./docker/pipeline
      dockerfile: Dockerfile
    container_name: cryptopulse-kibana-init
    environment:
      KIBANA_HOST: kibana
      KIBANA_PORT_INTERNAL: 5601
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: ["python", "-m", "src.common.kibana_bootstrap"]
    depends_on:
      kibana:
        condition: service_healthy
    networks:
      - cryptopulse-net
    restart: "no"

  # ---------------- Team-authored pipeline (utility container) ----------------
  # This container holds the team's Python code as its own image.
  # Airflow imports the same code via the shared volume; this service is here
  # so the project explicitly satisfies the rubric requirement that
  # "team-authored code must run in its own container".
  # It can also be used to manually run scripts, e.g.:
  #   docker compose run --rm pipeline python -m src.ingestion.ingest_prices
  pipeline:
    build:
      context: ./docker/pipeline
      dockerfile: Dockerfile
    container_name: cryptopulse-pipeline
    environment:
      DATA_MODE: ${DATA_MODE}
      CRYPTO_SYMBOLS: ${CRYPTO_SYMBOLS}
      NEWS_RSS_FEEDS: ${NEWS_RSS_FEEDS}
      ZSCORE_THRESHOLD: ${ZSCORE_THRESHOLD}
      ZSCORE_WINDOW_MINUTES: ${ZSCORE_WINDOW_MINUTES}
      NEWS_LINK_WINDOW_MINUTES: ${NEWS_LINK_WINDOW_MINUTES}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - cryptopulse-net
    # Idle by default; we exec into it or run one-shot commands.
    command: ["tail", "-f", "/dev/null"]

volumes:
  postgres-data:
  pgadmin-data:
  airflow-logs:
  elasticsearch-data:

networks:
  cryptopulse-net:
    driver: bridge
